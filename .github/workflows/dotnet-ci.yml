name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore csharp-ci-demo.csproj

      - name: Build
        run: dotnet build csharp-ci-demo.csproj --no-restore

      - name: Run tests
        run: dotnet test csharp-ci-demo.csproj --no-build --verbosity normal
