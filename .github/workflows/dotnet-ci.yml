name: .NET CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore main project
        run: dotnet restore MyApp/MyApp.csproj

      - name: Build main project
        run: dotnet build MyApp/MyApp.csproj --no-restore

      - name: Restore test project
        run: dotnet restore MyApp.Tests/MyApp.Tests.csproj

      - name: Build test project
        run: dotnet build MyApp.Tests/MyApp.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test MyApp.Tests/MyApp.Tests.csproj --no-build --verbosity normal
